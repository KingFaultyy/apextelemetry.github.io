<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - ApexTelemetry</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Montserrat',sans-serif; background:#121212; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:#1b1b1b; padding:40px; border-radius:10px; width:100%; max-width:400px; box-shadow:0 0 15px #000; }
h1 { margin-bottom:20px; color:#00f0ff; }
input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none; }
button { width:100%; padding:10px; background:#00f0ff; color:#121212; font-weight:600; border:none; border-radius:5px; cursor:pointer; transition:0.2s; }
button:hover { background:#00cfff; }
p { text-align:center; margin-top:15px; }
a { color:#ff8c00; text-decoration:none; }
</style>
</head>
<body>
<div class="container">
  <h1>Sign Up</h1>
  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password">
  <input type="text" id="license" placeholder="Karting License (Optional)">
  <button onclick="signup()">Sign Up</button>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
function signup() {
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const license = document.getElementById('license').value;

  if(!username || !email || !password || !confirm){ alert('Fill all required fields'); return; }
  if(password!==confirm){ alert('Passwords do not match'); return; }

  let users = JSON.parse(localStorage.getItem('users')||'[]');
  if(users.find(u=>u.username===username || u.email===email)){ alert('User already exists'); return; }

  const newUser = {username,email,password,license};
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('loggedInUser', JSON.stringify(newUser));
  alert('Account created!');
  window.location.href = 'index.html';
}
</script>
</body>
</html>
